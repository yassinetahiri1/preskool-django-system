{% extends 'Home/base.html' %}
{% load static %}
{% block body %}

<div class="page-wrapper">
   <div class="content container-fluid">
      <div class="page-header">
         <div class="row align-items-center">
            <div class="col">
               <h3 class="page-title">Edit Holiday</h3>
               <ul class="breadcrumb">
                  <li class="breadcrumb-item"><a href="{% url 'Holidays' %}">Holidays</a></li>
                  <li class="breadcrumb-item active">Edit Holiday</li>
               </ul>
            </div>
         </div>
      </div>
      <div class="row">
         <div class="col-sm-12">
            <div class="card">
               <div class="card-body">
                  <form method="POST">
                     {% csrf_token %}
                     <div class="row">
                        <div class="col-12">
                           <h5 class="form-title"><span>Holiday Information</span></h5>
                        </div>
                        <div class="col-12 col-sm-6">
                           <div class="form-group">
                              <label>Title</label>
                              <input type="text" class="form-control" name="title" value="{{ holiday.title }}" required>
                           </div>
                        </div>
                        <div class="col-12 col-sm-6">
                           <div class="form-group">
                              <label>Start Date</label>
                              <input type="date" class="form-control" name="start_date" value="{{ holiday.start_date|date:'Y-m-d' }}" required>
                           </div>
                        </div>
                        <div class="col-12 col-sm-6">
                           <div class="form-group">
                              <label>End Date</label>
                              <input type="date" class="form-control" name="end_date" value="{{ holiday.end_date|date:'Y-m-d' }}" required>
                           </div>
                        </div>
                        <div class="col-12 col-sm-6">
                        </div>
                        <div class="col-12">
                           <div class="form-group">
                              <label>Description</label>
                              <textarea class="form-control" name="description" rows="3">{{ holiday.description }}</textarea>
                           </div>
                        </div>
                        <div class="col-12">
                           <button type="submit" class="btn btn-primary">Save Changes</button>
                           <a href="{% url 'Holidays' %}" class="btn btn-secondary ml-2">Cancel</a>
                        </div>
                     </div>
                  </form>
               </div>
            </div>
         </div>
      </div>
   </div>
</div>

<script src="{% static 'assets/js/jquery-3.6.0.min.js' %}"></script>
<script src="{% static 'assets/js/popper.min.js' %}"></script>
<script src="{% static 'assets/plugins/bootstrap/js/bootstrap.min.js' %}"></script>
<script src="{% static 'assets/plugins/slimscroll/jquery.slimscroll.min.js' %}"></script>
<script src="{% static 'assets/js/script.js' %}"></script>

{% endblock %}
