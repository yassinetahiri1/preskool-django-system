{% extends 'Home/base.html' %}
{% load static %}
{% block body %}

<div class="page-wrapper">
   <div class="content container-fluid">
      <div class="page-header">
         <div class="row align-items-center">
            <div class="col">
               <h3 class="page-title">Edit Exam</h3>
               <ul class="breadcrumb">
                  <li class="breadcrumb-item"><a href="{% url 'exam_list' %}">Exams</a></li>
                  <li class="breadcrumb-item active">Edit Exam</li>
               </ul>
            </div>
         </div>
      </div>
      <div class="row">
         <div class="col-sm-12">
            <div class="card">
               <div class="card-body">
                  <form method="POST">
                     {% csrf_token %}
                     <div class="row">
                        <div class="col-12">
                           <h5 class="form-title"><span>Exam Information</span></h5>
                        </div>

                        <div class="col-12 col-sm-6">
                           <div class="form-group">
                              <label>Exam Title</label>
                              <input type="text" class="form-control" name="title" value="{{ exam.title }}" required>
                           </div>
                        </div>

                        <div class="col-12 col-sm-6">
                           <div class="form-group">
                              <label>Subject</label>
                              <select class="form-control" name="subject" required>
                                 <option value="">-- Select Subject --</option>
                                 {% for subject in subjects %}
                                    <option value="{{ subject.id }}"
                                       {% if subject.id == exam.subject.id %}selected{% endif %}>
                                       {{ subject.name }}
                                    </option>
                                 {% endfor %}
                              </select>
                           </div>
                        </div>

                        <div class="col-12 col-sm-6">
                           <div class="form-group">
                              <label>Exam Date</label>
                              <input type="date" class="form-control" name="exam_date" value="{{ exam.exam_date|date:'Y-m-d' }}" required>
                           </div>
                        </div>

                        <div class="col-12 col-sm-6">
                           <div class="form-group">
                              <label>Start Time</label>
                              <input type="time" class="form-control" name="start_time" value="{{ exam.start_time|time:'H:i' }}" required>
                           </div>
                        </div>

                        <div class="col-12 col-sm-6">
                           <div class="form-group">
                              <label>End Time</label>
                              <input type="time" class="form-control" name="end_time" value="{{ exam.end_time|time:'H:i' }}" required>
                           </div>
                        </div>

                        <div class="col-12 col-sm-6">
                           <div class="form-group">
                              <label>Class</label>
                              <input type="text" class="form-control" name="student_class" value="{{ exam.student_class }}" required>
                           </div>
                        </div>

                        <div class="col-12 col-sm-6">
                           <div class="form-group">
                              <label>Section</label>
                              <input type="text" class="form-control" name="section" value="{{ exam.section }}" required>
                           </div>
                        </div>

                        <div class="col-12 col-sm-6">
                           <div class="form-group">
                              <label>Status</label>
                              <select class="form-control" name="status" required>
                                 <option value="Scheduled" {% if exam.status == 'Scheduled' %}selected{% endif %}>Scheduled</option>
                                 <option value="Completed" {% if exam.status == 'Completed' %}selected{% endif %}>Completed</option>
                                 <option value="Cancelled" {% if exam.status == 'Cancelled' %}selected{% endif %}>Cancelled</option>
                              </select>
                           </div>
                        </div>

                        <div class="col-12">
                           <div class="form-group">
                              <label>Description</label>
                              <textarea class="form-control" name="description" rows="3">{{ exam.description }}</textarea>
                           </div>
                        </div>

                        <div class="col-12">
                           <button type="submit" class="btn btn-primary">Save Changes</button>
                           <a href="{% url 'exam_list' %}" class="btn btn-secondary ml-2">Cancel</a>
                        </div>
                     </div>
                  </form>
               </div>
            </div>
         </div>
      </div>
   </div>
</div>

<script src="{% static 'assets/js/jquery-3.6.0.min.js' %}"></script>
<script src="{% static 'assets/js/popper.min.js' %}"></script>
<script src="{% static 'assets/plugins/bootstrap/js/bootstrap.min.js' %}"></script>
<script src="{% static 'assets/plugins/slimscroll/jquery.slimscroll.min.js' %}"></script>
<script src="{% static 'assets/js/script.js' %}"></script>

{% endblock %}
