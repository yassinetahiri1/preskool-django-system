{% extends 'Home/base.html' %}
{% load static %}
{% block body %}

<div class="page-wrapper">
   <div class="content container-fluid">
      <div class="page-header">
         <div class="row align-items-center">
            <div class="col">
               <h3 class="page-title">Edit Result</h3>
               <ul class="breadcrumb">
                  <li class="breadcrumb-item"><a href="{% url 'exam_results' %}">Results</a></li>
                  <li class="breadcrumb-item active">Edit Result</li>
               </ul>
            </div>
         </div>
      </div>
      <div class="row">
         <div class="col-sm-12">
            <div class="card">
               <div class="card-body">
                  <form method="POST">
                     {% csrf_token %}
                     <div class="row">
                        <div class="col-12">
                           <h5 class="form-title"><span>Result Information</span></h5>
                        </div>

                        <div class="col-12 col-sm-6">
                           <div class="form-group">
                              <label>Exam</label>
                              <select class="form-control" name="exam" required>
                                 <option value="">-- Select Exam --</option>
                                 {% for exam in exams %}
                                    <option value="{{ exam.id }}"
                                       {% if exam.id == result.exam.id %}selected{% endif %}>
                                       {{ exam.title }} - {{ exam.exam_date }}
                                    </option>
                                 {% endfor %}
                              </select>
                           </div>
                        </div>

                        <div class="col-12 col-sm-6">
                           <div class="form-group">
                              <label>Student</label>
                              <select class="form-control" name="student" required>
                                 <option value="">-- Select Student --</option>
                                 {% for student in students %}
                                    <option value="{{ student.id }}"
                                       {% if student.id == result.student.id %}selected{% endif %}>
                                       {{ student.first_name }} {{ student.last_name }}
                                    </option>
                                 {% endfor %}
                              </select>
                           </div>
                        </div>

                        <div class="col-12 col-sm-6">
                           <div class="form-group">
                              <label>Marks</label>
                              <input type="number" class="form-control" name="marks" step="0.01" min="0" value="{{ result.marks }}" required>
                           </div>
                        </div>

                        <div class="col-12 col-sm-6">
                           <div class="form-group">
                              <label>Total</label>
                              <input type="number" class="form-control" name="total" step="0.01" value="{{ result.total }}" required>
                           </div>
                        </div>

                        <div class="col-12 col-sm-6">
                           <div class="form-group">
                              <label>Grade</label>
                              <select class="form-control" name="grade">
                                 <option value="">-- Select Grade --</option>
                                 <option value="A+" {% if result.grade == 'A+' %}selected{% endif %}>A+</option>
                                 <option value="A"  {% if result.grade == 'A'  %}selected{% endif %}>A</option>
                                 <option value="B+" {% if result.grade == 'B+' %}selected{% endif %}>B+</option>
                                 <option value="B"  {% if result.grade == 'B'  %}selected{% endif %}>B</option>
                                 <option value="C+" {% if result.grade == 'C+' %}selected{% endif %}>C+</option>
                                 <option value="C"  {% if result.grade == 'C'  %}selected{% endif %}>C</option>
                                 <option value="D"  {% if result.grade == 'D'  %}selected{% endif %}>D</option>
                                 <option value="F"  {% if result.grade == 'F'  %}selected{% endif %}>F</option>
                              </select>
                           </div>
                        </div>

                        <div class="col-12">
                           <div class="form-group">
                              <label>Remarks</label>
                              <textarea class="form-control" name="remarks" rows="3">{{ result.remarks }}</textarea>
                           </div>
                        </div>

                        <div class="col-12">
                           <button type="submit" class="btn btn-primary">Save Changes</button>
                           <a href="{% url 'exam_results' %}" class="btn btn-secondary ml-2">Cancel</a>
                        </div>
                     </div>
                  </form>
               </div>
            </div>
         </div>
      </div>
   </div>
</div>

<script src="{% static 'assets/js/jquery-3.6.0.min.js' %}"></script>
<script src="{% static 'assets/js/popper.min.js' %}"></script>
<script src="{% static 'assets/plugins/bootstrap/js/bootstrap.min.js' %}"></script>
<script src="{% static 'assets/plugins/slimscroll/jquery.slimscroll.min.js' %}"></script>
<script src="{% static 'assets/js/script.js' %}"></script>

{% endblock %}
